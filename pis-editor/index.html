<script>
function changeAccent() {
    document.getElementById("Form 2").style.fill = document.getElementById("Accent Colour").value;
    document.getElementById("Form 4").style.fill = document.getElementById("Accent Colour").value;
    document.getElementById("Form 5").style.fill = document.getElementById("Accent Colour").value;
    document.getElementById("Form 3").style.stroke = document.getElementById("Accent Colour").value;
    document.getElementById("Form 3 copy").style.stroke = document.getElementById("Accent Colour").value;
    document.getElementById("Form 3 copy 2").style.stroke = document.getElementById("Accent Colour").value;
    document.getElementById("Form 3 copy 3").style.stroke = document.getElementById("Accent Colour").value;
    document.getElementById("Form 3 copy 4").style.stroke = document.getElementById("Accent Colour").value;
}
function changePrimaryTextColour() {
    var textElements = document.querySelectorAll(".t9");
    textElements.forEach(function(element) {
        element.style.fill = document.getElementById("Text Colour").value;
    });
}
function changeSecondaryTextColour() {
    var textElements = document.querySelectorAll(".t2, .t3, .t8");
    textElements.forEach(function(element) {
        element.style.fill = document.getElementById("Secondary Text Colour").value;
    });
}
</script>
